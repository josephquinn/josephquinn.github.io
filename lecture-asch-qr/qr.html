<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generate QR Code</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Source+Sans+3:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="qr-layout">
      <section class="card active" aria-labelledby="qr-title">
        <p class="eyebrow">Instructor tool</p>
        <h1 id="qr-title">Generate your lecture QR code</h1>
        <p class="lead">
          Paste the final GitHub Pages URL for <code>index.html</code>. This
          page will create a QR image you can drop into your slideshow.
        </p>

        <form id="qr-form" novalidate>
          <label class="field-label" for="target-url">Published page URL</label>
          <input
            id="target-url"
            name="url"
            type="url"
            placeholder="https://yourname.github.io/lecture-asch-qr/"
            required
          />
          <button type="submit">Generate QR code</button>
        </form>

        <p class="status" id="qr-status" role="status" aria-live="polite"></p>
      </section>

      <section class="card active qr-preview" aria-labelledby="preview-title">
        <p class="eyebrow">Preview</p>
        <h2 id="preview-title">Scannable code</h2>
        <img
          id="qr-image"
          alt="QR code preview will appear here after you generate it."
        />
        <a id="download-link" class="button-link" href="#" download="asch-qr.png"
          >Download PNG</a
        >
        <p class="small-note">
          This page uses <code>api.qrserver.com</code> to render the QR image in
          the browser.
        </p>
      </section>
    </main>

    <script src="./qr.js"></script>
  </body>
</html>
